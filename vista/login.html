<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Clínica San Lucas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<section class="formulario-cita-seccion">
    <div class="formulario-cita-contenedor" style="max-width: 500px;">
        <h2>Ingreso al sistema</h2>
        <p class="subtitulo-formulario">Accede como recepción o médico.</p>

        {% if mensaje %}
        <div class="mensaje-exito">{{ mensaje }}</div>
        {% endif %}

        <form method="POST" class="formulario-cita">
            <div class="grupo-campo grupo-campo-completo">
                <label for="correo">Correo</label>
                <input type="email" id="correo" name="correo" required>
            </div>

            <div class="grupo-campo grupo-campo-completo">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required>
            </div>

            <div class="grupo-campo grupo-campo-completo">
                <button type="submit" class="btn-enviar-cita">Entrar</button>
            </div>
        </form>
    </div>
</section>

</body>
</html>
