<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CuidarT | Recuperar contraseña</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#2f80ed;
--secondary:#56ccf2;
--text-dark:#1f2937;
--text-muted:#6b7280;
--input-border:#dbe7f3;
}

*{
font-family:'Inter',sans-serif;
}

html,body{
height:100%;
margin:0;
}

body{
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at top left, rgba(86,204,242,0.18), transparent 28%),
radial-gradient(circle at bottom right, rgba(47,128,237,0.18), transparent 28%),
linear-gradient(180deg,#f9fcff 0%,#edf4fb 100%);
}

.form-card{

width:100%;
max-width:480px;

background:rgba(255,255,255,0.85);

border-radius:28px;

padding:40px;

box-shadow:0 25px 60px rgba(31,111,224,0.12);

}

.brand-row{
display:flex;
align-items:center;
gap:14px;
margin-bottom:24px;
}

.brand-logo{
width:54px;
}

.brand-title{
font-size:1.9rem;
font-weight:800;
color:var(--primary);
}

.title{
font-size:1.9rem;
font-weight:800;
color:var(--text-dark);
margin-bottom:6px;
}

.subtitle{
color:var(--text-muted);
margin-bottom:22px;
}

.input-group-custom{
position:relative;
}

.input-icon{
position:absolute;
top:50%;
left:16px;
transform:translateY(-50%);
color:#8aa0b8;
}

.form-control-custom{
height:52px;
border-radius:14px;
border:1.5px solid var(--input-border);
padding-left:45px;
}

.btn-main{
height:52px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
font-weight:700;
}

.helper{
text-align:center;
margin-top:18px;
}

.helper a{
color:var(--primary);
font-weight:600;
text-decoration:none;
}

</style>
</head>

<body>

<div class="form-card">

<div class="brand-row">
<!-- <img src="{{ url_for('static', filename='img/logo.png') }}" class="brand-logo"> -->
<h1 class="brand-title">CuidarT</h1>
</div>

<div class="title">Recuperar contraseña</div>
<div class="subtitle">
Ingresa tu usuario para generar un enlace de recuperación.
</div>

{% if mensaje %}
<div class="alert alert-danger text-center">
{{ mensaje }}
</div>
{% endif %}

{% if mensaje_html %}
<div class="alert alert-info text-center">
{{ mensaje_html | safe }}
</div>
{% endif %}

<form action="{{ url_for('auth.recuperar_password') }}" method="POST">
<label>Usuario</label>

<div class="input-group-custom mb-3">

<i class="bi bi-person input-icon"></i>

<input
type="text"
name="usuario"
class="form-control form-control-custom"
placeholder="Ingresa tu usuario"
required>

</div>

<button class="btn btn-main w-100">

<i class="bi bi-envelope"></i>
Enviar enlace de recuperación

</button>

</form>

<div class="helper">
<a href="{{ url_for('auth.login') }}">
Volver al inicio de sesión
</a>
</div>

</div>

</body>
</html>
